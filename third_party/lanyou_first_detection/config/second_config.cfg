# SecondOutSurfaceDetection 参数配置（圆柱展开截面法：余高+错边）

cylinder_voxel_leaf: 2.00               # 圆柱拟合输入体素下采样尺寸(mm)
enable_cylinder_smoothing: 1            # 是否启用圆柱拟合前平滑(1=开,0=关)
cylinder_smooth_max_points: 80000       # 触发平滑的最大点数，超出则跳过以保证速度
cylinder_smooth_radius: 3.0            # MLS平滑搜索半径(mm)
cylinder_smooth_polynomial_order: 2     # MLS多项式阶数
cylinder_smooth_polynomial_fit: 1       # MLS是否启用多项式拟合(1=开,0=关)
normal_radius: 5.0                      # 法向估计邻域半径(mm)
fit_distance_threshold: 0.26             # RANSAC圆柱点到模型距离阈值(mm)
radius_limit_min: 595.00                 # 圆柱半径下限(mm)
radius_limit_max: 605.00                 # 圆柱半径上限(mm)

seam_voxel_leaf: 2.00                    # 输入焊缝点云体素下采样尺寸(mm)

st_theta_bins: 720                       # 环向离散bin数
st_candidate_band_half_width: 20.0       # 候选焊缝带半宽(mm)
st_candidate_min_abs_h: 0.6              # 候选带最小强度阈值(mm)
st_min_bin_points: 20                    # 每个环向bin最小点数

st_centerline_s_step: 5.0                # 中心线沿轴向采样步长(mm)
st_centerline_s_window: 2.5              # 中心线每个s采样窗口半宽(mm)
st_min_centerline_points: 20             # 估计中心线所需最小点数

st_section_step: 5.0                     # 截面沿轴向间隔(mm)
st_section_half_thickness: 1.5           # 单截面轴向厚度半宽(mm)
st_section_half_width_t: 50.0            # 单截面环向覆盖半宽(mm)
st_min_points_per_section: 20            # 保留截面所需最小点数

st_profile_bin_du: 1.0                   # 截面曲线在环向u方向的bin宽(mm)
st_toe_search_half_width_t: 25.0         # 焊趾搜索半宽(mm)
st_toe_min_gap_t: 6.0                    # 左右焊趾最小间隔约束(mm)
st_parent_d1: 8.0                        # 母材拟合窗口内边距(mm)
st_parent_d2: 25.0                       # 母材拟合窗口外边距(mm)
st_huber_delta: 0.8                      # 截面母材直线Huber阈值(mm)
st_min_parent_points: 10                 # 单侧母材拟合最少点数
st_min_valid_sections: 5                 # 输出最终结果所需最少有效截面数
