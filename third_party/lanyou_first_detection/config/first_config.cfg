# FirstOutSurfaceDetection 参数配置（粗拟合 + 切片圆心迭代轴线）

# ---------- 预处理 / 粗拟合 ----------
downsample_leaf: 1.0                    # 原始点云均匀下采样体素边长(mm)
coarse_normal_radius: 3.0               # 粗拟合法向估计搜索半径(mm)
coarse_fit_distance_threshold: 1.5      # 粗拟合圆柱RANSAC距离阈值(mm)
radius_limit_min: 580.0                 # 圆柱半径下限(mm)
radius_limit_max: 620.0                 # 圆柱半径上限(mm)

# ---------- 内表面开孔半径限制 ----------
hole_radius_limit_min: 8.0              # 封头开孔半径下限(mm)
hole_radius_limit_max: 20.0             # 封头开孔半径上限(mm)
hole_cylinder_fit_distance_threshold: 0.5   # 开孔圆柱拟合距离阈值(mm)

# ---------- 轴向区间裁剪 ----------
axis_end_trim_ratio: 0.15               # 沿粗轴线去除两端比例（每端），0.15 表示去两端各15%

# ---------- 切片拟合圆 ----------
slice_step: 5.0                         # 切片中心沿轴向步长(mm)
slice_thickness: 0.6                    # 单个切片厚度(mm)
slice_min_points: 80                    # 单切片最少点数，低于该值跳过
circle_min_inlier_points: 50            # 圆拟合内点最少点数，低于该值跳过
circle_inlier_sigma_scale: 2.5          # 圆拟合残差阈值系数: thr = scale * sigma
circle_inlier_thr_min: 0.5              # 圆拟合残差阈值下限(mm)
circle_inlier_thr_max: 2.0              # 圆拟合残差阈值上限(mm)

# ---------- 圆心拟合轴线 ----------
centerline_inlier_sigma_scale: 2.0      # 圆心到轴线距离阈值系数: thr = scale * sigma
centerline_inlier_thr_min: 0.5          # 圆心离群阈值下限(mm)
centerline_inlier_thr_max: 3.0          # 圆心离群阈值上限(mm)
axis_refine_max_iter: 5                 # 轴线最大迭代次数
axis_refine_converge_rad: 1e-4          # 轴线收敛角阈值(rad)

# ---------- 最终内点筛选 ----------
radial_inlier_sigma_scale: 2.0          # 径向残差阈值系数: thr = scale * sigma
radial_inlier_thr_min: 0.2              # 径向残差阈值下限(mm)
radial_inlier_thr_max: 1.0              # 径向残差阈值上限(mm)

# ---------- 轴向切片直线拟合 / 直边约束 ----------
line_slice_angle_step_deg: 10.0          # 沿圆柱轴线切平面的角步长(度)
line_slice_distance_tolerance: 1.5      # 点到切平面距离阈值(mm)
line_fit_distance_tolerance: 0.1        # 2D投影直线RANSAC距离阈值(mm)
vertical_line_parallel_max_angle_deg: 0.5  # 直边线与圆柱轴夹角上限(度)，超限剔除
edge_stat_filter_ratio: 0.1             # 坡口角/直边高度/斜度统计时两端过滤比例
